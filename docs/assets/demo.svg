<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="14">
  <!-- Terminal transcript of two real `tablegold diff` runs against the
       committed example golden (examples/goldens/daily_metrics.csv).
       Text content is copied verbatim from an actual execution. -->
  <rect width="960" height="520" rx="10" fill="#0d1117"/>
  <rect width="960" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="960" height="14" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="480" y="22" fill="#8b949e" text-anchor="middle" font-size="12">tablegold — tolerate the noise, catch the drift</text>
  <g fill="#c9d1d9">
    <text x="24" y="64"><tspan fill="#7ee787">$</tspan> tablegold diff --key region goldens/daily_metrics.csv out/metrics_v1_1.csv</text>
    <text x="24" y="88">tablegold: golden goldens/daily_metrics.csv vs actual out/metrics_v1_1.csv</text>
    <text x="24" y="112">rows: 3 golden vs 3 actual, aligned by key (region)</text>
    <text x="24" y="136">result: <tspan fill="#7ee787">MATCH</tspan> (3 row(s) x 5 column(s) within tolerance)</text>
    <text x="24" y="176"><tspan fill="#7ee787">$</tspan> tablegold diff --key region goldens/daily_metrics.csv out/metrics_discounted.csv</text>
    <text x="24" y="200">tablegold: golden goldens/daily_metrics.csv vs actual out/metrics_discounted.csv</text>
    <text x="24" y="224">rows: 3 golden vs 3 actual, aligned by key (region)</text>
    <text x="24" y="248">column revenue [float]: <tspan fill="#f85149">2 of 3 values outside tolerance</tspan> (rtol=1e-09, atol=1e-12)</text>
    <text x="24" y="272">  region=north: golden=1156.8966999999998 actual=1155.8661304999998  |diff|=1.03 rel=0.000891</text>
    <text x="24" y="296">  region=west: golden=2070.1846 actual=2068.9416688  |diff|=1.24 rel=0.0006</text>
    <text x="24" y="320">column avg_unit_price [float]: <tspan fill="#f85149">2 of 3 values outside tolerance</tspan> (rtol=1e-09, atol=1e-12)</text>
    <text x="24" y="344">  region=north: golden=88.99205384615382 actual=88.91277926923075  |diff|=0.0793 rel=0.000891</text>
    <text x="24" y="368">  region=west: golden=121.77556470588236 actual=121.70245110588236  |diff|=0.0731 rel=0.0006</text>
    <text x="24" y="392">result: <tspan fill="#f85149">MISMATCH</tspan> (4 cell diff(s), 0 schema/row error(s), 0 note(s))</text>
    <text x="24" y="432"><tspan fill="#7ee787">$</tspan> echo $?</text>
    <text x="24" y="456">1</text>
    <text x="24" y="492" fill="#8b949e">float noise from a re-ordered fold: MATCH — a leaked 0.1% discount: caught, cell by cell</text>
  </g>
</svg>
